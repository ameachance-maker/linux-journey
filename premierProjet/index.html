<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4 text-slate-800">

    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-md border border-slate-100 max-w-md w-full">
        <h1 class="text-2xl font-extrabold text-slate-900 text-center mb-2">Créer un compte</h1>
        <p class="text-sm text-slate-500 text-center mb-6">Veuillez renseigner vos informations pour vous inscrire</p>
        
        <form action="traitement.php" method="post" class="space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nom complet</label>
                <input type="text" name="nom" placeholder="Ex: Maeva" required 
                       class="w-full border border-slate-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Adresse e-mail</label>
                <input type="email" name="email" placeholder="Ex: contact@exemple.com" required 
                       class="w-full border border-slate-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Mot de passe</label>
                <input type="password" name="mot_de_passe" placeholder="••••••••" required 
                       class="w-full border border-slate-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-sm mt-2 text-sm">
                S'inscrire
            </button>
            
        </form>
    </div>

</body>
</html>
